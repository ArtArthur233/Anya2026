=<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quiz pour Anya 💖</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
  --pink1:#ffe4ec;
  --pink2:#ffd1dc;
  --pink3:#ffb3c6;
  --rose:#ff4d6d;
}

body{
  margin:0;
  font-family:"DM Sans",sans-serif;
  background: linear-gradient(-45deg,var(--pink1),var(--pink2),#fff0f5,var(--pink3));
  background-size:400% 400%;
  animation: bg 12s ease infinite;
  overflow-x:hidden;
}

@keyframes bg{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

h1,h2{
  font-family:"Playfair Display",serif;
}

.screen{
  display:none;
  min-height:100vh;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  padding:20px;
}

.active{display:flex;}

.card{
  background:white;
  border-radius:24px;
  padding:24px;
  max-width:420px;
  width:100%;
  box-shadow:0 20px 50px rgba(0,0,0,0.1);
}

button{
  padding:14px 18px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  font-weight:600;
  transition:.2s;
}

.btn{
  background:var(--rose);
  color:white;
}

.btn:hover{
  transform:translateY(-2px);
}

.option{
  width:100%;
  margin-top:10px;
  background:#fff;
  border:2px solid #eee;
}

.option:hover{
  border-color:var(--pink3);
}

.progress{
  width:100%;
  height:10px;
  background:#eee;
  border-radius:999px;
  overflow:hidden;
  margin:15px 0;
}

.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--pink3),var(--rose));
  transition:.3s;
}

.fade{
  animation:fade .4s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

.shake{
  animation:shake .3s;
}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  75%{transform:translateX(5px)}
}

.hearts{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
}

.heart{
  position:absolute;
  font-size:18px;
  animation:float 4s linear forwards;
  opacity:.6;
}

@keyframes float{
  0%{transform:translateY(100vh) rotate(0)}
  100%{transform:translateY(-10vh) rotate(360deg);opacity:0}
}

.gift{
  font-size:24px;
  font-weight:700;
  color:var(--rose);
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<!-- WELCOME -->
<section id="welcome" class="screen active">
  <div class="card fade">
    <h1>Joyeux anniversaire mon amour ❤️</h1>
    <p>J'ai préparé un petit quiz pour toi...</p>
    <button class="btn" onclick="start()">Commencer 💖</button>
  </div>
</section>

<!-- QUIZ -->
<section id="quiz" class="screen">
  <div class="card">
    <h2 id="qtext"></h2>

    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>

    <div id="options"></div>

    <p id="hint" style="color:#ff4d6d;display:none;margin-top:10px;">
      Essaie encore 💕
    </p>
  </div>
</section>

<!-- FINAL -->
<section id="final" class="screen">
  <div class="card fade">
    <h1>🎉 Bravo mon amour 🎉</h1>
    <p>Tu es la plus belle personne de ma vie ❤️</p>

    <div class="gift">
      🎁 Code Ozon : <br><br>
      <span style="letter-spacing:2px;">OZON-LOVE-2026</span>
    </div>
  </div>
</section>

<script>
const questions = [
 {q:"Comment dit-on «Привет» ?",o:["Bonjour","Merci","Au revoir"],c:0},
 {q:"Que signifie «Merci» ?",o:["Спасибо","Пожалуйста","Извините"],c:0},
 {q:"Que veut dire «кошка» ?",o:["Chien","Chat","Oiseau"],c:1},
 {q:"Jour après lundi ?",o:["Mardi","Mercredi","Dimanche"],c:0},
 {q:"Que signifie «счастье» ?",o:["Tristesse","Bonheur","Colère"],c:1},
 {q:"Complète : Tu es très ___",o:["jolie","triste","fatiguée"],c:0},
 {q:"Que veut dire «поцелуй» ?",o:["Cadeau","Baiser","Danse"],c:1},
 {q:"«Je t’aime» en russe ?",o:["Я тебя люблю","Спасибо","Привет"],c:0},
 {q:"Complète : Mon cœur bat pour ___",o:["toi","travail","chocolat"],c:0},
 {q:"Que signifie «навсегда» ?",o:["Toujours","Jamais","Parfois"],c:0},
 {q:"«fleurs» en français ?",o:["fleurs","étoiles","nuages"],c:0},
 {q:"Complète : Tu es mon ___",o:["amour","ami","chat"],c:0},
 {q:"Que signifie «любовь» ?",o:["Amour","Haïr","Rire"],c:0},
 {q:"Je t’aime ?",o:["Oui","Non","Peut-être"],c:0}
];

let i=0;
let bgMusic;

function start(){
 if (!bgMusic) {
  bgMusic = new Audio("music.mp3");
  bgMusic.loop = true;
  bgMusic.play().catch(err => console.log("Audio play blocked or failed:", err));
 }
 document.getElementById("welcome").classList.remove("active");
 document.getElementById("quiz").classList.add("active");
 show();
}

function show(){
 let q=questions[i];
 document.getElementById("qtext").textContent=q.q;

 let box=document.getElementById("options");
 box.innerHTML="";

 q.o.forEach((t,idx)=>{
  let b=document.createElement("button");
  b.textContent=t;
  b.className="option";
  b.onclick=()=>check(idx,b);
  box.appendChild(b);
 });

 document.getElementById("bar").style.width=
 ((i)/questions.length)*100+"%";

 document.getElementById("hint").style.display="none";
}

function check(idx,btn){
 if(idx===questions[i].c){
  heart();
  i++;
  if(i>=questions.length){
   finish();
  }else{
   setTimeout(show,400);
  }
 }else{
  btn.classList.add("shake");
  document.getElementById("hint").style.display="block";
  setTimeout(()=>btn.classList.remove("shake"),300);
 }
}

function finish(){
 document.getElementById("quiz").classList.remove("active");
 document.getElementById("final").classList.add("active");
 document.getElementById("bar").style.width="100%";
}

function heart(){
 for(let k=0;k<8;k++){
  let s=document.createElement("div");
  s.className="heart";
  s.textContent="💖";
  s.style.left=Math.random()*100+"vw";
  s.style.fontSize=(12+Math.random()*20)+"px";
  s.style.animationDuration=(2+Math.random()*2)+"s";
  document.getElementById("hearts").appendChild(s);
  setTimeout(()=>s.remove(),4000);
 }
}
</script>

</body>
</html>
