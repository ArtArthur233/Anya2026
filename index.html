=<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quiz pour Anya 💖</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
  --pink1:#ffe4ec;
  --pink2:#ffd1dc;
  --pink3:#ffb3c6;
  --rose:#ff4d6d;
}

body{
  margin:0;
  font-family:"DM Sans",sans-serif;
  background: url("fond/1.png") no-repeat center center fixed;
  background-size: cover;
  overflow-x:hidden;
  position: relative;
  min-height: 100vh;
}

h1,h2{
  font-family:"Playfair Display",serif;
}

.screen{
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  min-height: 100vh;
  box-sizing: border-box;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.5s ease-in-out;
}

.active{
  opacity: 1;
  pointer-events: auto;
}

.card{
  background: linear-gradient(135deg, rgba(255, 225, 130, 0.5) 0%, rgba(255, 179, 198, 0.5) 100%);
  backdrop-filter: blur(0px);
  -webkit-backdrop-filter: blur(0px);
  border: 1px solid rgba(255, 255, 255, 0.35);
  border-radius:24px;
  padding:24px;
  max-width:420px;
  width:100%;
  box-shadow:0 20px 50px rgba(0,0,0,0.1);
  transform: translateY(40px);
}

button{
  padding:14px 18px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  font-weight:600;
  transition:.2s;
}

.btn{
  background:var(--rose);
  color:white;
}

.btn:hover{
  transform:translateY(-2px);
}

.option{
  width:100%;
  margin-top:10px;
  background:#fff;
  border:2px solid #eee;
}

.option:hover{
  border-color:var(--pink3);
}

.progress{
  width:100%;
  height:10px;
  background:#eee;
  border-radius:999px;
  overflow:hidden;
  margin:15px 0;
}

.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--pink3),var(--rose));
  transition:.3s;
}

.fade{
  animation:fade .2s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

.shake{
  animation:shake .3s;
}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  75%{transform:translateX(5px)}
}

.hearts{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
}

.heart{
  position:absolute;
  font-size:18px;
  animation:float 4s linear forwards;
  opacity:.6;
}

@keyframes float{
  0%{transform:translateY(100vh) rotate(0)}
  100%{transform:translateY(-10vh) rotate(360deg);opacity:0}
}

.gift{
  font-size:24px;
  font-weight:700;
  color:var(--rose);
}

.option.correct{
  background: #d4edda !important;
  border-color: #28a745 !important;
  color: #155724 !important;
}

.option:disabled{
  pointer-events: none;
  opacity: 0.6;
}

.option.correct:disabled{
  opacity: 1;
}

#feedback{
  display: none;
  margin: 30px 0;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.65);
  color: var(--rose);
  font-weight: 600;
  font-size: 18px;
  line-height: 1.5;
  border: 1px dashed var(--rose);
  animation: fade 0.3s ease;
  transition: opacity 1.5s ease-in-out;
}

#quiz-content{
  transition: opacity 1.0s ease-in-out;
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<!-- WELCOME -->
<section id="welcome" class="screen active">
  <div class="card fade">
    <h1>Joyeux anniversaire mon amour ❤️</h1>
    <p>I made this little game for you... can you find all the answers ? :O</p>
    <button class="btn" onclick="start()">Commencer 💖</button>
  </div>
</section>

<!-- QUIZ -->
<section id="quiz" class="screen">
  <img src="images/scene1/1.gif" alt="Illustration" style="max-width: 400px; width: 100%; border-radius: 20px; margin-bottom: 35px; box-shadow: 0 10px 30px rgba(255, 77, 109, 0.25); object-fit: cover; transform: translateY(-40px);">
  <div class="card">
    <div id="quiz-content">
      <h2 id="qtext"></h2>
      <div id="options"></div>
    </div>

    <div id="feedback"></div>

    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>

    <p id="hint" style="color:#ff4d6d;display:none;margin-top:10px;">
      Essaie encore 💕
    </p>
  </div>
</section>

<!-- FINAL -->
<section id="final" class="screen">
  <div class="card fade">
    <h1>🎉 Bravo mon amour 🎉</h1>
    <p>Tu es la plus belle personne de ma vie ❤️</p>

    <div class="gift">
      🎁 Code Ozon : <br><br>
      <span style="letter-spacing:2px;">OZON-LOVE-2026</span>
    </div>
  </div>
</section>

<script>
const questions = [
 {q:"Comment dit-on «Привет» ?",o:["Bonjour","Merci","Au revoir"],c:0,comment:"« Привет » (Privet) veut dire Bonjour en russe ! 😊"},
 {q:"Que signifie «Merci» ?",o:["Спасибо","Пожалуйста","Извините"],c:0,comment:"Exact ! « Спасибо » (Spassibo) veut dire Merci. Tu commences très bien ! 💖"},
 {q:"Que veut dire «кошка» ?",o:["Chien","Chat","Oiseau"],c:1,comment:"Oui ! C'est le chat. Comme notre petit chat d'amour ! 🐱"},
 {q:"Jour après lundi ?",o:["Mardi","Mercredi","Dimanche"],c:0,comment:"Bravo ! Après le lundi vient bien le mardi 📅"},
 {q:"Que signifie «счастье» ?",o:["Tristesse","Bonheur","Colère"],c:1,comment:"Le bonheur... C'est exactement ce que je ressens à tes côtés ! 🥰"},
 {q:"Complète : Tu es très ___",o:["jolie","triste","fatiguée"],c:0,comment:"Tu es la plus jolie fille du monde entier, mon cœur ! 😍"},
 {q:"Que veut dire «поцелуй» ?",o:["Cadeau","Baiser","Danse"],c:1,comment:"« Поцелуй » (Potselouï) veut dire Baiser. Un gros bisou pour toi ! 😘"},
 {q:"«Je t’aime» en russe ?",o:["Я тебя люблю","Спасибо","Привет"],c:0,comment:"« Я тебя люблю » (Ya tebya lyublyu). Je t'aime plus que tout ! ❤️"},
 {q:"Complète : Mon cœur bat pour ___",o:["toi","travail","chocolat"],c:0,comment:"Il bat uniquement pour toi, et ce pour toujours... 💓"},
 {q:"Que signifie «навсегда» ?",o:["Toujours","Jamais","Parfois"],c:0,comment:"« Навсегда » (Navsegda) signifie Pour toujours. Notre amour est éternel ♾️"},
 {q:"«fleurs» en français ?",o:["fleurs","étoiles","nuages"],c:0,comment:"Des fleurs magnifiques pour la plus belle des fleurs 🌸"},
 {q:"Complète : Tu es mon ___",o:["amour","ami","chat"],c:0,comment:"Tu es mon amour, ma vie, mon tout ! 💘"},
 {q:"Que signifie «любовь» ?",o:["Amour","Haïr","Rire"],c:0,comment:"« Любовь » (Lyubov), c'est l'Amour, le vrai, celui qu'on partage 💝"},
 {q:"Je t’aime ?",o:["Oui","Non","Peut-être"],c:0,comment:"Oui ! Un grand oui, je t'aime infiniment !!! ❤️❤️❤️"}
];

let i=0;
let bgMusic;

function start(){
 if (!bgMusic) {
  bgMusic = new Audio("music.mp3");
  bgMusic.loop = true;
  bgMusic.play().catch(err => console.log("Audio play blocked or failed:", err));
 }
 document.getElementById("welcome").classList.remove("active");
 setTimeout(() => {
  document.getElementById("quiz").classList.add("active");
  show();
 }, 2000);
}

function show(){
 let q=questions[i];
 document.getElementById("qtext").textContent=q.q;

 let box=document.getElementById("options");
 box.innerHTML="";

 q.o.forEach((t,idx)=>{
  let b=document.createElement("button");
  b.textContent=t;
  b.className="option";
  b.onclick=()=>check(idx,b);
  box.appendChild(b);
 });

 document.getElementById("bar").style.width=
 ((i)/questions.length)*100+"%";

 document.getElementById("hint").style.display="none";
 
 // Reset opacity and display of quiz-content
 const quizContent = document.getElementById("quiz-content");
 quizContent.style.display = "block";
 quizContent.style.opacity = 0;
 setTimeout(() => {
  quizContent.style.opacity = 1;
 }, 50);
}

function check(idx,btn){
 if(idx===questions[i].c){
  heart();
  
  // Highlight correct option and disable all options
  btn.classList.add("correct");
  document.querySelectorAll(".option").forEach(b => b.disabled = true);
  
  const quizContent = document.getElementById("quiz-content");
  const feedback = document.getElementById("feedback");
  
  // Step 1: Fade out the quiz block
  quizContent.style.opacity = 0;
  
  setTimeout(() => {
   // Hide quiz content when faded out
   quizContent.style.display = "none";
   
   // Setup the cute message in feedback block
   feedback.textContent = questions[i].comment;
   feedback.style.display = "block";
   feedback.style.opacity = 0;
   
   // Step 2: Fade in the cute message
   setTimeout(() => {
    feedback.style.opacity = 1;
   }, 50);
   
   // Step 3: Keep message visible for 3 seconds, then fade it out
   setTimeout(() => {
    feedback.style.opacity = 0;
    
    // Wait for the message fade-out animation to finish
    setTimeout(() => {
     feedback.style.display = "none";
     
     // Step 4: Advance index and transition to next question or finish
     i++;
     if(i>=questions.length){
      finish();
     }else{
      show();
     }
    }, 400); // feedback fade-out duration
    
   }, 3000); // time the comment stays visible
   
  }, 400); // quiz-content fade-out duration
  
 }else{
  btn.classList.add("shake");
  document.getElementById("hint").style.display="block";
  setTimeout(()=>btn.classList.remove("shake"),300);
 }
}

function finish(){
 document.getElementById("quiz").classList.remove("active");
 setTimeout(() => {
  document.getElementById("final").classList.add("active");
  document.getElementById("bar").style.width="100%";
 }, 2000);
}

function heart(){
 for(let k=0;k<8;k++){
  let s=document.createElement("div");
  s.className="heart";
  s.textContent="💖";
  s.style.left=Math.random()*100+"vw";
  s.style.fontSize=(12+Math.random()*20)+"px";
  s.style.animationDuration=(2+Math.random()*2)+"s";
  document.getElementById("hearts").appendChild(s);
  setTimeout(()=>s.remove(),4000);
 }
}
</script>

</body>
</html>
