<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quiz pour Anya 💖</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
  --pink1:#ffe4ec;
  --pink2:#ffd1dc;
  --pink3:#ffb3c6;
  --rose:#ff4d6d;
}

body{
  margin:0;
  font-family:"DM Sans",sans-serif;
  background: url("fond/1.png") no-repeat center center fixed;
  background-size: cover;
  overflow-x:hidden;
  position: relative;
  min-height: 100vh;
}

h1,h2{
  font-family:"Playfair Display",serif;
  color: white;
  text-shadow: 1px 1px 3px rgba(255, 77, 109, 0.3);
}

.screen{
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  min-height: 100vh;
  box-sizing: border-box;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.5s ease-in-out;
}

.active{
  opacity: 1;
  pointer-events: auto;
}

.card{
  position: relative;
  background: linear-gradient(135deg, rgba(135, 135, 135, 0) 0%, rgba(255, 215, 225, 0.5) 100%);
  border: 1px solid rgba(255, 255, 255, 0.6);
  border-radius:24px;
  padding:24px;
  max-width:420px;
  width:100%;
  box-shadow:0 20px 50px rgba(0,0,0,0.1);
  transform: translateY(40px);
  box-sizing: border-box;
}

.card p{
  color: white;
  text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.15);
}

button{
  padding:14px 18px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  font-weight:600;
  transition:.2s;
}

.btn{
  background:var(--rose);
  color:rgb(255, 255, 255);
}

.btn:hover{
  transform:translateY(-2px);
}

.option{
  width:100%;
  margin-top:12px;
  background: rgba(255, 255, 255, 0.75);
  border: 1px solid rgba(255, 255, 255, 0.5);
  box-shadow: 0 4px 10px rgba(0,0,0,0.03);
  font-family: inherit;
  font-size: 16px;
  color: #4a4a4a;
  outline: none;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.option:hover{
  background: white;
  border-color: var(--pink3);
  transform: translateY(-2px);
  box-shadow: 0 6px 15px rgba(252, 48, 85, 0.1);
}

.option:active{
  transform: translateY(0);
}

.progress{
  width:100%;
  height:10px;
  background:#eeeeee;
  border-radius:999px;
  overflow:hidden;
  margin:15px 0;
}

.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--pink3),var(--rose));
  transition:.3s;
}

.fade{
  animation:fade .2s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

.shake{
  animation:shake .3s;
}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  75%{transform:translateX(5px)}
}

.hearts{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
  z-index:10;
}

.leaves-container {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}

.leaf {
  position: absolute;
  top: -25px;
  pointer-events: none;
  animation: leafFall linear forwards;
}

@keyframes leafFall {
  0% {
    transform: translateY(0) rotate(0deg) translateX(0);
  }
  100% {
    transform: translateY(105vh) rotate(360deg) translateX(var(--drift, 50px));
  }
}

.heart{
  position:absolute;
  font-size:18px;
  animation:float 4s linear forwards;
  opacity:.6;
}

@keyframes float{
  0%{transform:translateY(100vh) rotate(0)}
  100%{transform:translateY(-10vh) rotate(360deg);opacity:0}
}

.gift{
  font-size:24px;
  font-weight:700;
  color:var(--rose);
}

.option.correct{
  background: #d4edda !important;
  border-color: #28a745 !important;
  color: #155724 !important;
  box-shadow: 0 6px 15px rgba(40, 167, 69, 0.2) !important;
}

.option:disabled{
  pointer-events: none;
  opacity: 0.6;
}

.option.correct:disabled{
  opacity: 1;
}

#feedback {
  display: none;
  position: absolute;
  top: 24px;
  left: 24px;
  right: 24px;
  bottom: 80px;
  border-radius: 20px;
  color: #ffffffb5;
  -webkit-text-stroke: 1px #ffffff;
  text-shadow: 1px 1px 0 #ff4c0b62, -1px -1px 0 #ff540b6d, 1px -1px 0 #ff0b4869, -1px 1px 0 #ff890ba9;
  font-weight: 700;
  font-size: 18px;
  line-height: 1.5;
  transition: opacity 1.5s ease-in-out;
  align-items: center;
  justify-content: center;
  padding: 20px;
  box-sizing: border-box;
  text-align: center;
}

#quiz-content{
  transition: opacity 0.4s ease-in-out;
}

#qimg {
  transition: opacity 0.4s ease-in-out;
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>
<div class="leaves-container" id="leaves-container"></div>

<!-- WELCOME -->
<section id="welcome" class="screen active">
  <div class="card fade">
    <h1>Joyeux anniversaire mon amour ❤️</h1>
    <p>I made this little game for you... can you find all the answers ? :O</p>
    <button class="btn" onclick="start()">Commencer 💖</button>
  </div>
</section>

<!-- QUIZ -->
<section id="quiz" class="screen">
  <img id="qimg" src="images/scene1/1.gif" alt="Illustration" style="max-width: 400px; width: 100%; border-radius: 20px; margin-bottom: 35px; box-shadow: 0 10px 30px rgba(255, 77, 109, 0.25); object-fit: cover; transform: translateY(-40px);">
  <div class="card">
    <div id="quiz-content">
      <h2 id="qtext"></h2>
      <div id="options"></div>
    </div>

    <div id="feedback"></div>

    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>

    <p id="hint" style="color:#ff4d6d;display:none;margin-top:10px;">
      Essaie encore 💕
    </p>
  </div>
</section>

<!-- FINAL -->
<section id="final" class="screen">
  <img src="images/scene2/1.gif" alt="Félicitations" style="max-width: 400px; width: 100%; border-radius: 20px; margin-bottom: 35px; box-shadow: 0 10px 30px rgba(255, 77, 109, 0.25); object-fit: cover; transform: translateY(-40px);">
  <div class="card fade">
    <h1>🎉 Bravo mon amour 🎉</h1>
    <p>Tu es la plus belle personne de ma vie ❤️</p>

    <div class="gift">
      🎁 Code Ozon : <br><br>
      <span style="letter-spacing:2px;">OZON-LOVE-2026</span>
    </div>
  </div>
</section>

<script>
const questions = [
 {q:"Comment dit-on «Привет» ?",o:["Bonjour","Merci","Au revoir"],c:0,comment:"« Привет » (Privet) veut dire Bonjour en russe ! 😊",img:"images/scene1/1.gif"},
 {q:"Que signifie «Merci» ?",o:["Спасибо","Пожалуйста","Извините"],c:0,comment:"Exact ! « Спасибо » (Spassibo) veut dire Merci. Tu commences très bien ! 💖",img:"images/scene1/1.gif"},
 {q:"Que veut dire «кошка» ?",o:["Chien","Chat","Oiseau"],c:1,comment:"Oui ! C'est le chat. Comme notre petit chat d'amour ! 🐱",img:"images/scene1/1.gif"},
 {q:"Jour après lundi ?",o:["Mardi","Mercredi","Dimanche"],c:0,comment:"Bravo ! Après le lundi vient bien le mardi 📅",img:"images/scene1/1.gif"},
 {q:"Que signifie «счастье» ?",o:["Tristesse","Bonheur","Colère"],c:1,comment:"Le bonheur... C'est exactement ce que je ressens à tes côtés ! 🥰",img:"images/scene1/1.gif"},
 {q:"Complète : Tu es très ___",o:["jolie","triste","fatiguée"],c:0,comment:"Tu es la plus jolie fille du monde entier, mon cœur ! 😍",img:"images/5.png"},
 {q:"Que veut dire «поцелуй» ?",o:["Cadeau","Baiser","Danse"],c:1,comment:"« Поцелуй » (Potselouï) veut dire Baiser. Un gros bisou pour toi ! 😘",img:"images/6.png"},
 {q:"«Je t’aime» en russe ?",o:["Я тебя люблю","Спасибо","Привет"],c:0,comment:"« Я тебя люблю » (Ya tebya lyublyu). Je t'aime plus que tout ! ❤️",img:"images/7.png"},
 {q:"Complète : Mon cœur bat pour ___",o:["toi","travail","chocolat"],c:0,comment:"Il bat uniquement pour toi, et ce pour toujours... 💓",img:"images/8.png"},
 {q:"Que signifie «навсегда» ?",o:["Toujours","Jamais","Parfois"],c:0,comment:"« Навсегда » (Navsegda) signifie Pour toujours. Notre amour est éternel ♾️",img:"images/9.png"},
 {q:"«fleurs» en français ?",o:["fleurs","étoiles","nuages"],c:0,comment:"Des fleurs magnifiques pour la plus belle des fleurs 🌸",img:"images/10.png"},
 {q:"Complète : Tu es mon ___",o:["amour","ami","chat"],c:0,comment:"Tu es mon amour, ma vie, mon tout ! 💘",img:"images/11.png"},
 {q:"Que veut dire «любовь» ?",o:["Amour","Haïr","Rire"],c:0,comment:"« Любовь » (Lyubov), c'est l'Amour, le vrai, celui qu'on partage 💝",img:"images/12.png"},
 {q:"Je t’aime ?",o:["Oui","Non","Peut-être"],c:0,comment:"Oui ! Un grand oui, je t'aime infiniment !!! ❤️❤️❤️",img:"images/scene2/1.gif"}
];

let i=0;
let bgMusic;

// Preload images to prevent lag
const imagesToPreload = [
  "images/scene1/1.gif",
  "images/transition1/1.gif",
  "images/5.png",
  "images/6.png",
  "images/7.png",
  "images/8.png",
  "images/9.png",
  "images/10.png",
  "images/11.png",
  "images/12.png",
  "images/scene2/1.gif"
];
imagesToPreload.forEach(src => {
  const img = new Image();
  img.src = src;
});

function start(){
 if (!bgMusic) {
  bgMusic = new Audio("music.mp3");
  bgMusic.loop = true;
  bgMusic.play().catch(err => console.log("Audio play blocked or failed:", err));
 }
 document.getElementById("welcome").classList.remove("active");
 setTimeout(() => {
  document.getElementById("quiz").classList.add("active");
  show();
 }, 2000);
}

function show(){
 let q=questions[i];
 document.getElementById("qtext").textContent=q.q;

 let box=document.getElementById("options");
 box.innerHTML="";

 q.o.forEach((t,idx)=>{
  let b=document.createElement("button");
  b.textContent=t;
  b.className="option";
  b.onclick=()=>check(idx,b);
  box.appendChild(b);
 });

 // Set question image with transition
 const qimg = document.getElementById("qimg");
 qimg.src = q.img ? q.img : "images/scene1/1.gif";
 qimg.style.opacity = 1;

 document.getElementById("bar").style.width=
 ((i)/questions.length)*100+"%";

 document.getElementById("hint").style.display="none";
 
 // Reset visibility and opacity of quiz-content
 const quizContent = document.getElementById("quiz-content");
 quizContent.style.visibility = "visible";
 quizContent.style.opacity = 0;
 setTimeout(() => {
  quizContent.style.opacity = 1;
 }, 50);
}

function check(idx,btn){
 if(idx===questions[i].c){
  heart();
  
  btn.classList.add("correct");
  document.querySelectorAll(".option").forEach(b => b.disabled = true);
  
  const quizContent = document.getElementById("quiz-content");
  const feedback = document.getElementById("feedback");
  const qimg = document.getElementById("qimg");
  
  // Step 1: Fade out the quiz block
  quizContent.style.opacity = 0;
  
  const isFirstThree = i < 3;
  
  if (isFirstThree) {
   // Smoothly fade out current image
   qimg.style.opacity = 0;
   
   setTimeout(() => {
    // Set to the transition gif and fade it back in
    qimg.src = "images/transition1/1.gif";
    qimg.style.opacity = 1;
    
    // Hide question content layout but keep size
    quizContent.style.visibility = "hidden";
    
    // Step 2: Show the transition GIF for 2000ms before displaying comment
    setTimeout(() => {
     feedback.textContent = questions[i].comment;
     feedback.style.display = "flex";
     feedback.style.opacity = 0;
     
     setTimeout(() => {
      feedback.style.opacity = 1;
     }, 50);
     
     // Step 3: Keep comment visible for 4000ms (since transition is slower), then fade it out
     setTimeout(() => {
      feedback.style.opacity = 0;
      qimg.style.opacity = 0; // Fade out the transition gif
      
      setTimeout(() => {
       feedback.style.display = "none";
       i++;
       if(i>=questions.length){
        finish();
       }else{
        show();
       }
      }, 1500); // matches the 1.5s slow transition duration
      
     }, 4000);
     
    }, 2000); // display duration of transition gif
    
   }, 400); // duration of initial fade-out
   
  } else {
   // Normal flow for indices >= 3 (feedback overlays the question's image)
   setTimeout(() => {
    quizContent.style.visibility = "hidden";
    
    feedback.textContent = questions[i].comment;
    feedback.style.display = "flex";
    feedback.style.opacity = 0;
    
    setTimeout(() => {
     feedback.style.opacity = 1;
    }, 50);
    
    setTimeout(() => {
     feedback.style.opacity = 0;
     qimg.style.opacity = 0;
     
     setTimeout(() => {
      feedback.style.display = "none";
      i++;
      if(i>=questions.length){
       finish();
      }else{
       show();
      }
     }, 1500);
     
    }, 4000);
    
   }, 400);
  }
  
 }else{
  btn.classList.add("shake");
  document.getElementById("hint").style.display="block";
  setTimeout(()=>btn.classList.remove("shake"),300);
 }
}

function finish(){
 document.getElementById("quiz").classList.remove("active");
 setTimeout(() => {
  document.getElementById("final").classList.add("active");
  document.getElementById("bar").style.width="100%";
 }, 2000);
}

function heart(){
 for(let k=0;k<8;k++){
  let s=document.createElement("div");
  s.className="heart";
  s.textContent="💖";
  s.style.left=Math.random()*100+"vw";
  s.style.fontSize=(12+Math.random()*20)+"px";
  s.style.animationDuration=(2+Math.random()*2)+"s";
  document.getElementById("hearts").appendChild(s);
  setTimeout(()=>s.remove(),4000);
 }
}

function spawnLeaf() {
  const container = document.getElementById("leaves-container");
  if (!container) return;
  
  const leaf = document.createElement("div");
  leaf.className = "leaf";
  const leafTypes = ["🍁", "🍂"];
  leaf.textContent = leafTypes[Math.floor(Math.random() * leafTypes.length)];
  
  leaf.style.left = Math.random() * 100 + "vw";
  const size = 12 + Math.random() * 10;
  leaf.style.fontSize = size + "px";
  
  leaf.style.opacity = 0.35 + Math.random() * 0.25;
  
  const duration = 10 + Math.random() * 8;
  leaf.style.animationDuration = duration + "s";
  
  const drift = (Math.random() - 0.5) * 120;
  leaf.style.setProperty('--drift', drift + 'px');
  
  container.appendChild(leaf);
  
  setTimeout(() => {
    leaf.remove();
  }, duration * 1000);
}

// Start generating leaves
setInterval(spawnLeaf, 1200);

// Pre-populate falling leaves at random vertical heights on page load
for (let j = 0; j < 10; j++) {
  setTimeout(() => {
    const container = document.getElementById("leaves-container");
    if (!container) return;
    const leaf = document.createElement("div");
    leaf.className = "leaf";
    const leafTypes = ["🍁", "🍂"];
    leaf.textContent = leafTypes[Math.floor(Math.random() * leafTypes.length)];
    leaf.style.left = Math.random() * 100 + "vw";
    const size = 12 + Math.random() * 10;
    leaf.style.opacity = 0.35 + Math.random() * 0.25;
    const duration = 10 + Math.random() * 8;
    leaf.style.animationDuration = duration + "s";
    const drift = (Math.random() - 0.5) * 120;
    leaf.style.setProperty('--drift', drift + 'px');
    
    const startY = Math.random() * 90;
    leaf.style.top = startY + "vh";
    
    container.appendChild(leaf);
    
    const remainingTime = duration * (1 - startY / 100);
    setTimeout(() => {
      leaf.remove();
    }, remainingTime * 1000);
  }, j * 150);
}
</script>
</body>
</html>
